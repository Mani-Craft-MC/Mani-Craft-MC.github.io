<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mani</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  transition:0.5s;
}

/* 🔝 عنوان بالا */
h1{
  position:absolute;
  top:20px;
  color:white;
  font-size:40px;
  letter-spacing:2px;
}

/* 📦 وسط صفحه */
.box{
  text-align:center;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}
</style>
</head>

<body>

<h1>Mani 😎</h1>

<div class="box">
  <h2>دکمه رو بزن 🎨</h2>
  <button onclick="changeBg()">تغییر رنگ</button>
</div>

<script>
const colors = [
  "#111", "#ff0000", "#00ff00",
  "#0000ff", "#ff00ff", "#00ffff",
  "#ffa500", "#8a2be2", "#222"
];

function changeBg(){
  let random = Math.floor(Math.random() * colors.length);
  document.body.style.background = colors[random];
}
</script>

</body>
</html>
