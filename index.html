<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دکمه عکس 👍</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:#111;
}

.box{
  text-align:center;
  color:white;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

img{
  width:220px;
  margin-top:20px;
  display:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>روی دکمه بزن 😎</h2>

  <button onclick="show()">نمایش 👍</button>

  <br>

  <img id="pic"
    src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Emoji_u1f44d.svg">
</div>

<script>
function show(){
  document.getElementById("pic").style.display = "block";
}
</script>

</body>
</html>
