<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مانی سایت QR</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
      background-size: 400% 400%;
      animation: bg 8s ease infinite;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      text-align: center;
      padding: 25px;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }

    h2 {
      color: white;
      margin-bottom: 15px;
    }

    img {
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffcc;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>اسکن کن 😎</h2>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://mani-craft-mc.github.io/" alt="QR Code">
  </div>

</body>
</html>
