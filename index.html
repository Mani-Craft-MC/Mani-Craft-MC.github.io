<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mani 😎</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  transition:0.5s;
}

/* 🌈 RGB */
.rgb{
  background:linear-gradient(-45deg,
  #ff0000,#ff7300,#fffb00,#00ff2a,#00d4ff,#7a00ff,#ff00c8);
  background-size:400% 400%;
  animation:move 3s linear infinite;
}

@keyframes move{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  color:white;
  font-size:45px;
  margin-bottom:20px;
}

button{
  margin:8px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#b1{background:white;}
#b2{background:#00ffcc;}
#b3{background:#ffcc00;}
</style>
</head>

<body>

<h1>Mani 😎</h1>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<button id="b1" onclick="changeBg()">تغییر رنگ 🎨</button>
<button id="b2" onclick="toggleRGB()">RGB 🌈</button>
<button id="b3" onclick="toggleMusic()">موزیک 🎵</button>

<script>
let rgbOn = false;
let musicOn = false;

/* 🎨 رنگ تصادفی */
function changeBg(){
  document.body.classList.remove("rgb");
  rgbOn = false;

  let color = "#" + Math.floor(Math.random()*16777215).toString(16);
  document.body.style.background = color;
}

/* 🌈 RGB */
function toggleRGB(){
  rgbOn = !rgbOn;

  if(rgbOn){
    document.body.classList.add("rgb");
  } else {
    document.body.classList.remove("rgb");
    document.body.style.background = "#111";
  }
}

/* 🎵 موزیک درست */
function toggleMusic(){
  let music = document.getElementById("music");

  if(!musicOn){
    music.play().catch(err => console.log("error:", err));
    musicOn = true;
  } else {
    music.pause();
    musicOn = false;
  }
}
</script>

</body>
</html>
