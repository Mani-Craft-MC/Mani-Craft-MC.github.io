<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سایت من</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      background: #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <header>
    <h1>سلام، من مانی هستم</h1>
    <p>این سایت شخصی من است</p>
    <a class="btn" href="#">بیشتر بدانید</a>
  </header>

</body>
</html>
