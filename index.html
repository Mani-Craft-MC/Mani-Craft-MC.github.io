<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mani 😎</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  transition:0.5s;
}

/* 🌈 RGB */
.rgb{
  background:linear-gradient(-45deg,
  #ff0000,#ff7300,#fffb00,#00ff2a,#00d4ff,#7a00ff,#ff00c8);
  background-size:400% 400%;
  animation:move 3s linear infinite;
}

@keyframes move{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  color:white;
  font-size:45px;
  margin-bottom:20px;
  text-shadow:0 0 10px black;
}

button{
  display:block;
  margin:10px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

#b1{background:white;}
#b2{background:#00ffcc;}
#b3{background:#ffcc00;}

</style>
</head>

<body>

<h1>Mani 😎</h1>

<!-- 🎵 آهنگ -->
<audio id="music" src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/ccCommunity/Rolemusic/Rolemusic_-_08_-_The_Way_You_Do.mp3"></audio>

<button id="b1" onclick="changeBg()">تغییر رنگ 🎨</button>

<button id="b2" onclick="toggleRGB()">RGB 🌈</button>

<button id="b3" onclick="toggleMusic()">پخش موزیک 🎵</button>

<script>
let rgbOn = false;
let playing = false;

/* 🎨 رنگ تصادفی */
function changeBg(){
  let color = "#" + Math.floor(Math.random()*16777215).toString(16);
  document.body.classList.remove("rgb");
  document.body.style.background = color;
  rgbOn = false;
}

/* 🌈 RGB */
function toggleRGB(){
  rgbOn = !rgbOn;

  if(rgbOn){
    document.body.classList.add("rgb");
  } else {
    document.body.classList.remove("rgb");
    document.body.style.background = "#111";
  }
}

/* 🎵 موزیک */
function toggleMusic(){
  let music = document.getElementById("music");

  if(!playing){
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}
</script>

</body>
</html>
