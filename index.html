<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mani 😎</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  background:#111;
  color:white;
}

/* 🔤 M بکگراند */
.mbg{
  position:absolute;
  font-size:240px;
  font-weight:bold;
  color:rgba(255,255,255,0.06);
  user-select:none;
}

/* 🏠 */
.screen{
  text-align:center;
  z-index:2;
  position:relative;
}

/* 🧊 دکمه‌ها */
button{
  margin:6px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:white;
}

/* 🎮 دوز */
.board{
  display:grid;
  grid-template-columns:repeat(3,80px);
  grid-template-rows:repeat(3,80px);
  gap:8px;
  margin-top:20px;
}

.cell{
  width:80px;
  height:80px;
  background:rgba(255,255,255,0.1);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
  border-radius:10px;
}

/* 🔵 دایره آبی با هاله رنگی */
.o{
  color:#00aaff;
  text-shadow:
    0 0 5px #00aaff,
    0 0 10px #00d4ff,
    0 0 20px #0099ff,
    0 0 30px #00aaff;
}

/* 🔴 X */
.x{
  color:#ff2d2d;
  text-shadow:0 0 10px #ff2d2d;
}

/* 💥 انفجار */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="mbg">M</div>

<!-- 🏠 MENU -->
<div id="menu" class="screen">
  <h1>Mani 😎</h1>

  <button onclick="openGame()">🎮 ورود به بازی</button>
  <button onclick="changeBg()">🎨 تغییر رنگ</button>
  <button onclick="toggleRGB()">🌈 RGB</button>
  <button onclick="boom()">💥 انفجار</button>
</div>

<!-- 🎮 GAME -->
<div id="game" class="screen" style="display:none;">
  <h2>دوز 🎮</h2>

  <button onclick="backMenu()">🏠 برگشت</button>
  <button onclick="resetGame()">🔄 ریست</button>

  <div class="board" id="board"></div>
  <div id="status">نوبت: 🔴 قرمز</div>
</div>

<script>

let currentPlayer="X";
let cells=Array(9).fill("");
let gameActive=true;

/* 🎮 ورود */
function openGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  document.body.style.background="#3b0000";
  createBoard();
}

/* 🏠 برگشت */
function backMenu(){
  document.getElementById("menu").style.display="block";
  document.getElementById("game").style.display="none";
  document.body.style.background="#111";
}

/* 🎨 تغییر رنگ */
function changeBg(){
  document.body.style.background="#" + Math.floor(Math.random()*16777215).toString(16);
}

/* 🌈 RGB */
let rgbOn=false;
let rgbInterval=null;

function toggleRGB(){
  rgbOn=!rgbOn;

  if(rgbOn){
    rgbInterval=setInterval(()=>{
      document.body.style.background="#" + Math.floor(Math.random()*16777215).toString(16);
    },500);
  }else{
    clearInterval(rgbInterval);
    document.body.style.background="#111";
  }
}

/* 💥 انفجار */
function boom(){
  for(let i=0;i<40;i++){
    let dot=document.createElement("div");
    dot.className="particle";

    dot.style.left=Math.random()*window.innerWidth+"px";
    dot.style.top=Math.random()*window.innerHeight+"px";
    dot.style.background=`hsl(${Math.random()*360},100%,60%)`;

    document.body.appendChild(dot);

    setTimeout(()=>{
      dot.style.transition="1s";
      dot.style.opacity="0";
      dot.style.transform="scale(0)";
    },10);

    setTimeout(()=>dot.remove(),1000);
  }
}

/* 🎮 board */
function createBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";

  cells.forEach((v,i)=>{
    let div=document.createElement("div");
    div.className="cell";

    if(v==="X"){
      div.classList.add("x");
      div.innerText="❌";
    }

    if(v==="O"){
      div.classList.add("o");
      div.innerText="🔵";
    }

    div.onclick=()=>play(i);
    board.appendChild(div);
  });
}

/* 🎯 play */
function play(i){
  if(!gameActive || cells[i]!="") return;

  cells[i]=currentPlayer;

  if(checkWin()){
    createBoard();
    return;
  }

  currentPlayer=currentPlayer==="X"?"O":"X";

  document.getElementById("status").innerText =
    currentPlayer==="X" ? "نوبت: 🔴 قرمز" : "نوبت: 🔵 آبی";

  createBoard();
}

/* 🏆 win */
function checkWin(){
  let win=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for(let w of win){
    let [a,b,c]=w;

    if(cells[a] && cells[a]===cells[b] && cells[a]===cells[c]){
      gameActive=false;
      document.getElementById("status").innerText="🏆 برنده شد";
      startExplosion();
      return true;
    }
  }

  if(!cells.includes("")){
    resetGame();
  }

  return false;
}

/* 💥 انفجار + ریست */
function startExplosion(){
  let start=Date.now();

  let interval=setInterval(()=>{
    boom();

    if(Date.now()-start>5000){
      clearInterval(interval);
      resetGame();
    }
  },200);
}

/* 🔄 reset */
function resetGame(){
  cells=Array(9).fill("");
  currentPlayer="X";
  gameActive=true;

  document.body.style.background="#3b0000";
  document.getElementById("status").innerText="نوبت: 🔴 قرمز";

  createBoard();
}

</script>

</body>
</html>
